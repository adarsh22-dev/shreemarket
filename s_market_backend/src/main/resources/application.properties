spring.application.name=s_market_backend
server.port=8082

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/smarketdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
server.tomcat.max-swallow-size=-1

# File Upload Directory (relative to working directory; override with -Dfile.upload-dir=/path)
file.upload-dir=uploads

# Google OAuth
google.client.id=${GOOGLE_CLIENT_ID:}

# Razorpay Payment Gateway
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_placeholder_key_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:rzp_test_placeholder_key_secret}

# MailerSend Email Service
mailersend.api.key=${MAILERSEND_API_KEY:}
app.base.url=${APP_BASE_URL:http://localhost:5173}
app.email.from=${APP_EMAIL_FROM:noreply@sreemarket.com}
app.email.from.name=${APP_EMAIL_FROM_NAME:SreeMarket}

# ──────────────────────────────────────────────
# Shipping - Pincode Availability Validation
# ──────────────────────────────────────────────
# Cache TTL in minutes for pincode serviceability lookups
shipping.cache.ttl-minutes=60

# Default shipping charge (₹) when no rule matches
shipping.default-charge=50

# Comma-separated list of blocked pincodes (conflict zones, restricted areas)
shipping.blocked-pincodes=

# Comma-separated list of pincode prefixes considered remote/unserviceable.
# Indian pincodes starting with "9" are Army Postal Service (APS) areas;
# most couriers do not service them. Override if your courier partners
# service specific military/defense zones.
shipping.remote-pincode-prefixes=91,92,93,94,95,96,97,98,99

